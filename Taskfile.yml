version: "3"

vars:
  BASE_DIR: "{{.ROOT_DIR}}"
  LOG_DIR: "{{.ROOT_DIR}}/logs"

  # Inator registry — add new inators here
  # Format: name:backend_port:frontend_port
  INATORS: >-
    authinator:8001:3001
    rmainator:8002:3002
    fulfilinator:8003:3003
    userinator:8004:3004

  # Directory names (capitalized) — must match filesystem
  AUTHINATOR_DIR: Authinator
  RMAINATOR_DIR: RMAinator
  FULFILINATOR_DIR: Fulfilinator
  USERINATOR_DIR: Userinator

set: [errexit, nounset, pipefail]

tasks:
  default:
    desc: List available tasks
    silent: true
    cmds:
      - task --list

  # ─── Setup ──────────────────────────────────────────

  setup:
    desc: First-time setup for all inators (install deps, configure env, migrate)
    cmds:
      - task: setup:authinator
      - task: setup:rmainator
      - task: setup:fulfilinator
      - task: setup:userinator
      - task: frontends:install
      - task: setup:admin
      - echo ""
      - echo "✅ Setup complete! All inators are ready."
      - echo ""
      - echo "Next steps:"
      - echo "  1. Start all services:"
      - echo "     task start:all"
      - echo "  2. Access the platform"
      - echo "     Gateway - http://localhost:8080"
      - echo ""

  setup:authinator:
    desc: Setup Authinator
    cmds:
      - task: _setup
        vars: { NAME: Authinator, DIR: "{{.AUTHINATOR_DIR}}" }

  setup:rmainator:
    desc: Setup RMAinator
    cmds:
      - task: _setup
        vars: { NAME: RMAinator, DIR: "{{.RMAINATOR_DIR}}" }

  setup:fulfilinator:
    desc: Setup Fulfilinator
    cmds:
      - task: _setup
        vars: { NAME: Fulfilinator, DIR: "{{.FULFILINATOR_DIR}}" }

  setup:userinator:
    desc: Setup USERinator
    cmds:
      - task: _setup
        vars: { NAME: USERinator, DIR: "{{.USERINATOR_DIR}}" }

  _setup:
    internal: true
    requires:
      vars: [NAME, DIR]
    cmds:
      - echo "🔧 Setting up {{.NAME}}..."
      - cd "{{.BASE_DIR}}/{{.DIR}}" && task install
      - |
        if [ ! -f "{{.BASE_DIR}}/{{.DIR}}/backend/.env" ]; then
          echo "   Creating backend/.env from .env.example"
          cp "{{.BASE_DIR}}/{{.DIR}}/backend/.env.example" "{{.BASE_DIR}}/{{.DIR}}/backend/.env"
        else
          echo "   backend/.env already exists, skipping"
        fi
      - echo "   Running migrations..."
      - cd "{{.BASE_DIR}}/{{.DIR}}" && task backend:migrate
      - echo "✓ {{.NAME}} setup complete"
      - echo ""

  setup:admin:
    desc: Create a default admin user in Authinator (interactive)
    cmds:
      - |
        echo ""
        echo "──────────────────────────────────────────"
        echo "  Admin User Setup"
        echo "──────────────────────────────────────────"
        echo ""
        printf "Create a default admin user? (admin / admin@example.com / admin123) [Y/n] "
        read -r answer </dev/tty
        case "$answer" in
          [nN]*)
            echo "Skipping admin creation."
            echo "You can create one later with:"
            echo "  cd Authinator && task backend:manage -- createsuperuser"
            ;;
          *)
            DJANGO_SUPERUSER_PASSWORD=admin123 \
              "{{.BASE_DIR}}/{{.AUTHINATOR_DIR}}/.venv/bin/python" \
              "{{.BASE_DIR}}/{{.AUTHINATOR_DIR}}/backend/manage.py" \
              createsuperuser --noinput --username admin --email admin@example.com 2>&1 \
            && echo "✓ Admin user created (admin / admin123)" \
            || echo "⚠ Admin user already exists, skipping"
            ;;
        esac

  # ─── Per-inator Frontends ─────────────────────────────────

  frontends:install:
    desc: Install frontend dependencies for all inators
    cmds:
      - |
        echo "📦 Installing frontend dependencies..."
        for dir in "{{.AUTHINATOR_DIR}}" "{{.RMAINATOR_DIR}}" "{{.FULFILINATOR_DIR}}" "{{.USERINATOR_DIR}}"; do
          echo "   $dir/frontend"
          cd "{{.BASE_DIR}}/$dir/frontend" && npm install --silent
        done
        echo "   shared/frontend"
        cd "{{.BASE_DIR}}/shared/frontend" && npm install --silent
        echo "✓ All frontend dependencies installed"

  frontends:build:
    desc: Build all per-inator frontends for production
    cmds:
      - |
        echo "🔨 Building all frontends..."
        for dir in "{{.AUTHINATOR_DIR}}" "{{.RMAINATOR_DIR}}" "{{.FULFILINATOR_DIR}}" "{{.USERINATOR_DIR}}"; do
          echo "   Building $dir/frontend..."
          cd "{{.BASE_DIR}}/$dir/frontend" && npm run build
        done
        echo "✓ All frontends built"

  frontends:start:
    desc: Start all per-inator frontend dev servers (background)
    cmds:
      - task: _start_frontend
        vars: { NAME: Authinator, DIR: "{{.AUTHINATOR_DIR}}", FRONTEND_PORT: "3001" }
      - task: _start_frontend
        vars: { NAME: RMAinator, DIR: "{{.RMAINATOR_DIR}}", FRONTEND_PORT: "3002" }
      - task: _start_frontend
        vars: { NAME: Fulfilinator, DIR: "{{.FULFILINATOR_DIR}}", FRONTEND_PORT: "3003" }
      - task: _start_frontend
        vars: { NAME: USERinator, DIR: "{{.USERINATOR_DIR}}", FRONTEND_PORT: "3004" }

  frontends:stop:
    desc: Stop all per-inator frontend dev servers
    cmds:
      - |
        echo "⏹  Stopping all frontends..."
        for port in 3001 3002 3003 3004; do
          pkill -f "vite.*$port" 2>/dev/null || true
        done

  _start_frontend:
    internal: true
    requires:
      vars: [NAME, DIR, FRONTEND_PORT]
    cmds:
      - mkdir -p "{{.LOG_DIR}}"
      - |
        echo "▶️  Starting {{.NAME}} frontend (:{{.FRONTEND_PORT}})..."
        cd "{{.BASE_DIR}}/{{.DIR}}/frontend"
        nohup npx vite --port {{.FRONTEND_PORT}} --strictPort \
          < /dev/null > "{{.LOG_DIR}}/{{.NAME}}-frontend.log" 2>&1 &
        echo "   PID: $!"
      - sleep 2

  # ─── Gateway ─────────────────────────────────────────

  gateway:start:
    desc: Start Caddy reverse proxy gateway (:8080)
    cmds:
      - mkdir -p "{{.LOG_DIR}}"
      - |
        # Kill any stale Caddy processes before starting
        STALE_PIDS=$(lsof -iTCP:8080 -sTCP:LISTEN -P -t 2>/dev/null || true)
        if [ -n "$STALE_PIDS" ]; then
          echo "   Cleaning up stale processes on :8080..."
          echo "$STALE_PIDS" | xargs kill -9 2>/dev/null || true
          sleep 1
        fi
        echo "▶️  Starting Caddy gateway (:8080)..."
        nohup caddy run --config "{{.BASE_DIR}}/Caddyfile.dev" \
          > "{{.LOG_DIR}}/gateway.log" 2>&1 &
        echo "   PID: $!"
      - sleep 1

  gateway:stop:
    desc: Stop Caddy reverse proxy gateway
    cmds:
      - |
        echo "⏹  Stopping Caddy gateway..."
        PIDS=$(lsof -iTCP:8080 -sTCP:LISTEN -P -t 2>/dev/null || true)
        if [ -n "$PIDS" ]; then
          echo "$PIDS" | xargs kill -9 2>/dev/null || true
        fi
        pkill -f "caddy" 2>/dev/null || true

  # ─── Start ──────────────────────────────────────────

  start:all:
    desc: Start all backends, per-inator frontends, gateway, and register services
    cmds:
      - task: _start_backend
        vars: { NAME: Authinator, DIR: "{{.AUTHINATOR_DIR}}", BACKEND_PORT: "8001" }
      - task: _start_backend
        vars: { NAME: RMAinator, DIR: "{{.RMAINATOR_DIR}}", BACKEND_PORT: "8002" }
      - task: _start_backend
        vars: { NAME: Fulfilinator, DIR: "{{.FULFILINATOR_DIR}}", BACKEND_PORT: "8003" }
      - task: _start_backend
        vars: { NAME: USERinator, DIR: "{{.USERINATOR_DIR}}", BACKEND_PORT: "8004" }
      - task: frontends:start
      - task: gateway:start
      - task: register
      - task: status

  register:
    desc: Register all services with Authinator (requires services to be running)
    cmds:
      - |
        echo "📋 Registering services with Authinator..."
        cd "{{.BASE_DIR}}/{{.RMAINATOR_DIR}}" && task backend:manage -- register_service 2>/dev/null || echo "   ⚠ RMAinator registration failed (is Authinator running?)"
        cd "{{.BASE_DIR}}/{{.FULFILINATOR_DIR}}" && task backend:manage -- register_service 2>/dev/null || echo "   ⚠ Fulfilinator registration failed (is Authinator running?)"
        cd "{{.BASE_DIR}}/{{.USERINATOR_DIR}}" && task backend:manage -- register_service 2>/dev/null || echo "   ⚠ USERinator registration failed (is Authinator running?)"

  start:authinator:
    desc: "(standalone) Start Authinator backend + frontend (:8001, :3001)"
    cmds:
      - task: _start
        vars:
          NAME: Authinator
          DIR: "{{.AUTHINATOR_DIR}}"
          BACKEND_PORT: "8001"
          FRONTEND_PORT: "3001"

  start:rmainator:
    desc: "(standalone) Start RMAinator backend + frontend (:8002, :3002)"
    cmds:
      - task: _start
        vars:
          NAME: RMAinator
          DIR: "{{.RMAINATOR_DIR}}"
          BACKEND_PORT: "8002"
          FRONTEND_PORT: "3002"

  start:fulfilinator:
    desc: "(standalone) Start Fulfilinator backend + frontend (:8003, :3003)"
    cmds:
      - task: _start
        vars:
          NAME: Fulfilinator
          DIR: "{{.FULFILINATOR_DIR}}"
          BACKEND_PORT: "8003"
          FRONTEND_PORT: "3003"

  start:userinator:
    desc: "(standalone) Start USERinator backend + frontend (:8004, :3004)"
    cmds:
      - task: _start
        vars:
          NAME: USERinator
          DIR: "{{.USERINATOR_DIR}}"
          BACKEND_PORT: "8004"
          FRONTEND_PORT: "3004"

  _start_backend:
    internal: true
    requires:
      vars: [NAME, DIR, BACKEND_PORT]
    cmds:
      - mkdir -p "{{.LOG_DIR}}"
      - |
        echo "▶️  Starting {{.NAME}} backend (:{{.BACKEND_PORT}})..."
        nohup "{{.BASE_DIR}}/{{.DIR}}/.venv/bin/python" \
          "{{.BASE_DIR}}/{{.DIR}}/backend/manage.py" runserver {{.BACKEND_PORT}} \
          > "{{.LOG_DIR}}/{{.NAME}}-backend.log" 2>&1 &
        echo "   PID: $!"
      - sleep 1

  _start:
    internal: true
    desc: "(legacy) Start both backend and per-inator frontend"
    requires:
      vars: [NAME, DIR, BACKEND_PORT, FRONTEND_PORT]
    cmds:
      - task: _start_backend
        vars: { NAME: "{{.NAME}}", DIR: "{{.DIR}}", BACKEND_PORT: "{{.BACKEND_PORT}}" }
      - |
        echo "▶️  Starting {{.NAME}} frontend (:{{.FRONTEND_PORT}})..."
        cd "{{.BASE_DIR}}/{{.DIR}}/frontend"
        nohup npx vite --port {{.FRONTEND_PORT}} --strictPort \
          < /dev/null > "{{.LOG_DIR}}/{{.NAME}}-frontend.log" 2>&1 &
        echo "   PID: $!"
      - sleep 2

  # ─── Stop ───────────────────────────────────────────

  stop:all:
    desc: Stop all services, frontends, and gateway
    cmds:
      - task: gateway:stop
      - task: frontends:stop
      - task: stop:authinator
      - task: stop:rmainator
      - task: stop:fulfilinator
      - task: stop:userinator
      - task: status

  stop:authinator:
    desc: Stop Authinator backend
    cmds:
      - task: _stop_backend
        vars: { NAME: Authinator, BACKEND_PORT: "8001" }

  stop:rmainator:
    desc: Stop RMAinator backend
    cmds:
      - task: _stop_backend
        vars: { NAME: RMAinator, BACKEND_PORT: "8002" }

  stop:fulfilinator:
    desc: Stop Fulfilinator backend
    cmds:
      - task: _stop_backend
        vars: { NAME: Fulfilinator, BACKEND_PORT: "8003" }

  stop:userinator:
    desc: Stop USERinator backend
    cmds:
      - task: _stop_backend
        vars: { NAME: USERinator, BACKEND_PORT: "8004" }

  _stop_backend:
    internal: true
    requires:
      vars: [NAME, BACKEND_PORT]
    cmds:
      - |
        echo "⏹  Stopping {{.NAME}} backend..."
        pkill -f "manage.py runserver {{.BACKEND_PORT}}" 2>/dev/null || true

  _stop:
    internal: true
    desc: "(legacy) Stop both backend and per-inator frontend"
    requires:
      vars: [NAME, BACKEND_PORT, FRONTEND_PORT]
    cmds:
      - |
        echo "⏹  Stopping {{.NAME}}..."
        pkill -f "manage.py runserver {{.BACKEND_PORT}}" 2>/dev/null || true
        pkill -f "vite.*{{.FRONTEND_PORT}}" 2>/dev/null || true

  # ─── Restart ────────────────────────────────────────

  restart:all:
    desc: Restart all inator services
    cmds:
      - task: stop:all
      - sleep 1
      - task: start:all

  restart:authinator:
    desc: Restart Authinator
    cmds:
      - task: stop:authinator
      - sleep 1
      - task: start:authinator

  restart:rmainator:
    desc: Restart RMAinator
    cmds:
      - task: stop:rmainator
      - sleep 1
      - task: start:rmainator

  restart:fulfilinator:
    desc: Restart Fulfilinator
    cmds:
      - task: stop:fulfilinator
      - sleep 1
      - task: start:fulfilinator

  restart:userinator:
    desc: Restart USERinator
    cmds:
      - task: stop:userinator
      - sleep 1
      - task: start:userinator

  # ─── Status

  status:
    desc: Check which inator ports are listening
    silent: true
    cmds:
      - |
        echo ""
        echo "Port status:"
        echo "  Gateway:"
        for port in 8080; do
          if lsof -iTCP:$port -sTCP:LISTEN -P >/dev/null 2>&1; then
            printf "    :%-5s ✓\n" $port
          else
            printf "    :%-5s ✗\n" $port
          fi
        done
        echo "  Frontends:"
        for port in 3001 3002 3003 3004; do
          if lsof -iTCP:$port -sTCP:LISTEN -P >/dev/null 2>&1; then
            printf "    :%-5s ✓\n" $port
          else
            printf "    :%-5s ✗\n" $port
          fi
        done
        echo "  Backends:"
        for port in 8001 8002 8003 8004; do
          if lsof -iTCP:$port -sTCP:LISTEN -P >/dev/null 2>&1; then
            printf "    :%-5s ✓\n" $port
          else
            printf "    :%-5s ✗\n" $port
          fi
        done
        echo ""

  # ─── Demo Database ───────────────────────────────────

  setup:demodb:
    desc: Build demo databases with sample data (does NOT touch active DBs)
    cmds:
      - |
        echo ""
        echo "══════════════════════════════════════════"
        echo "  Building demo databases"
        echo "══════════════════════════════════════════"
        echo ""
        for inator_dir in "{{.AUTHINATOR_DIR}}" "{{.RMAINATOR_DIR}}" "{{.FULFILINATOR_DIR}}" "{{.USERINATOR_DIR}}"; do
          DB="{{.BASE_DIR}}/$inator_dir/backend/db.sqlite3"
          DEMO="{{.BASE_DIR}}/$inator_dir/backend/db-demo.sqlite3"
          USER_BAK="{{.BASE_DIR}}/$inator_dir/backend/db.sqlite3.demobuild"

          # Stash active DB
          if [ -f "$DB" ]; then
            mv "$DB" "$USER_BAK"
          fi

          echo "🔧 Migrating $inator_dir..."
          cd "{{.BASE_DIR}}/$inator_dir" && task backend:migrate 2>&1 | tail -1

          # Seed using new comprehensive seed_demo commands
          echo "🌱 Seeding $inator_dir..."
          cd "{{.BASE_DIR}}/$inator_dir" && task backend:manage -- seed_demo 2>&1 | grep -v "WARNINGS:" | grep -v "settings\.ACCOUNT_" | grep -E "✓|✅|⚠️|Creating|Seeding|users seeded|Traceback|Error|SyntaxError" || echo "   (seed completed)"

          # Save as demo DB and restore active
          mv "$DB" "$DEMO"
          if [ -f "$USER_BAK" ]; then
            mv "$USER_BAK" "$DB"
          fi
          echo ""
        done
        echo "✅ Demo databases built!"
        echo ""
        echo "  Authinator:   backend/db-demo.sqlite3"
        echo "  RMAinator:    backend/db-demo.sqlite3"
        echo "  Fulfilinator: backend/db-demo.sqlite3"
        echo "  USERinator:   backend/db-demo.sqlite3"
        echo ""
        echo "📋 Demo includes:"
        echo "   - 4 companies (Acme, Globex, Initech, Wayne)"
        echo "   - 12 users (2 admins, 10 company users)"
        echo "   - 6 catalog items"
        echo "   - Full RBAC hierarchy (ADMIN/MANAGER/MEMBER)"
        echo ""
        echo "Run 'task demodb:activate' to switch to demo data."
        echo "Run 'task demodb:deactivate' to restore your real data."

  demodb:activate:
    desc: Swap active databases to demo data (backs up current DBs)
    cmds:
      - |
        echo "Activating demo databases..."
        for inator_dir in "{{.AUTHINATOR_DIR}}" "{{.RMAINATOR_DIR}}" "{{.FULFILINATOR_DIR}}" "{{.USERINATOR_DIR}}"; do
          DB="{{.BASE_DIR}}/$inator_dir/backend/db.sqlite3"
          DEMO="{{.BASE_DIR}}/$inator_dir/backend/db-demo.sqlite3"
          BAK="{{.BASE_DIR}}/$inator_dir/backend/db.sqlite3.bak"

          if [ ! -f "$DEMO" ]; then
            echo "⚠ $inator_dir: no demo DB found — run 'task setup:demodb' first"
            continue
          fi
          if [ -f "$BAK" ]; then
            echo "⚠ $inator_dir: backup already exists — already activated?"
            continue
          fi

          if [ -f "$DB" ]; then
            mv "$DB" "$BAK"
          fi
          cp "$DEMO" "$DB"
          echo "✓ $inator_dir: demo DB active"
        done
        echo ""
        echo "✅ Demo data is now active. Restart services to pick it up:"
        echo "   task restart:all"
        echo ""
        echo "📋 Demo Accounts:"
        echo "   Admins: admin/admin, alice.admin/admin"
        echo "   Managers: bob.manager/manager, frank.manager/manager, etc."
        echo "   Members: carol.member/member, grace.member/member, etc."
        echo ""
        echo "🔗 Access at: http://localhost:8080"

  demodb:deactivate:
    desc: Restore original databases (removes demo swap)
    cmds:
      - |
        echo "Restoring original databases..."
        for inator_dir in "{{.AUTHINATOR_DIR}}" "{{.RMAINATOR_DIR}}" "{{.FULFILINATOR_DIR}}" "{{.USERINATOR_DIR}}"; do
          DB="{{.BASE_DIR}}/$inator_dir/backend/db.sqlite3"
          BAK="{{.BASE_DIR}}/$inator_dir/backend/db.sqlite3.bak"

          if [ ! -f "$BAK" ]; then
            echo "⚠ $inator_dir: no backup found — demo not active?"
            continue
          fi

          mv "$BAK" "$DB"
          echo "✓ $inator_dir: original DB restored"
        done
        echo ""
        echo "✅ Original data restored. Restart services to pick it up:"
        echo "   task restart:all"

  setup:sso:
    desc: Configure OAuth providers (Google, Microsoft) from .env credentials
    cmds:
      - |
        echo "🔐 Configuring OAuth providers..."
        cd "{{.BASE_DIR}}/{{.AUTHINATOR_DIR}}/backend"
        ../.venv/bin/python manage.py setup_sso
        echo ""
        echo "✅ OAuth setup complete!"
        echo "   Google and Microsoft login buttons will appear on login page."
        echo "   Credentials loaded from Authinator/backend/.env"

  # ─── Logs ───────────────────────────────────────────

  logs:
    desc: Tail all inator logs
    cmds:
      - tail -f {{.LOG_DIR}}/*.log
